<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Visual Algorithm Explorer — an interactive playground for understanding data structures and algorithms through step-by-step visualizations."
    />
    <meta name="theme-color" content="#09090b" />
    <title>Visual Algorithm Explorer</title>
    <script>
      // Runs before paint to avoid a flash of the wrong theme.
      // Mirrors the logic in useSettingsStore / THEME_STORAGE_KEY —
      // kept in sync manually since this must run before any JS module loads.
      (function () {
        try {
          var stored = localStorage.getItem('vae-theme');
          var theme = stored ? JSON.parse(stored).state.theme : null;
          if (!theme) {
            theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          if (theme === 'dark') document.documentElement.classList.add('dark');
        } catch (e) {
          /* localStorage unavailable; default light theme renders */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
